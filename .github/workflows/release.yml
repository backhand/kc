name: release

on:
  push:
    tags:
      - "v*"

# Least privilege at the top; the release job escalates only what it needs
# (Scorecard Token-Permissions). Actions are pinned to commit SHAs.
permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release on this repo
      id-token: write # keyless cosign signing + build provenance (OIDC)
      attestations: write # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so the changelog can be built

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      # cosign signs the release checksums (keyless, via the GitHub OIDC token);
      # goreleaser's `signs` block invokes it. See .goreleaser.yaml. Pin the
      # cosign version — an unpinned major bump (v2->v3 made --bundle mandatory)
      # broke the v0.1.1 release; bump deliberately.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # GITHUB_TOKEN releases on backhand/kc.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN (a PAT) lets goreleaser push the cask to the
          # separate backhand/homebrew-tap repo. Set it in repo Settings →
          # Secrets → Actions. See RELEASING.md.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # SLSA build provenance for the archives + checksums (GitHub-native).
      # Verify with: gh attestation verify <file> --repo backhand/kc
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt
