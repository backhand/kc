name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release on this repo

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so the changelog can be built

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # GITHUB_TOKEN releases on backhand/kc.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN (a PAT) lets goreleaser push the formula to the
          # separate backhand/homebrew-tap repo. Set it in repo Settings →
          # Secrets → Actions. See RELEASING.md.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
