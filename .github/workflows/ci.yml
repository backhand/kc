name: ci

on:
  push:
    branches: [master, main]
  pull_request:

# Least privilege: CI only reads the repo (Scorecard Token-Permissions).
permissions:
  contents: read

# Actions are pinned to commit SHAs (Scorecard Pinned-Dependencies); the trailing
# comment is the human-readable version and what Dependabot bumps.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: test
        run: go test -race -count=1 ./...
